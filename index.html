<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gamache · Intentions SEO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--panel:#141418;--panel2:#1b1b20;--text:#ECEAE4;--muted:#8b877e;
  --line:rgba(255,255,255,.08);--accent:#caa86a;--accent-soft:rgba(202,168,106,.14)}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(1000px 500px at 50% -10%,rgba(202,168,106,.10),transparent 62%)}
.wrap{position:relative;max-width:960px;margin:0 auto;padding:36px 24px 72px}
.brand{display:flex;align-items:baseline;gap:12px;margin-bottom:6px}
.wordmark{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;letter-spacing:.12em}
.pill{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
  border:1px solid var(--accent-soft);background:var(--accent-soft);padding:4px 10px;border-radius:999px}
.tagline{color:var(--muted);font-size:13px;margin-bottom:22px}
.bar{display:flex;gap:10px;flex-wrap:wrap}
input{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:12px;
  padding:13px 15px;font:inherit;font-size:15px}
#seed{flex:1;min-width:240px}#region{width:170px}
button{background:var(--accent);color:#1a1408;border:none;border-radius:12px;padding:13px 22px;
  font:inherit;font-weight:600;cursor:pointer;letter-spacing:.02em}
button:disabled{opacity:.45;cursor:default}
#status{color:var(--muted);font-size:13px;margin:14px 2px;min-height:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:14px}
.chead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.cname{font-size:17px;font-weight:600}
.badges{display:flex;gap:7px}
.b{font-size:11px;letter-spacing:.03em;padding:3px 9px;border-radius:999px;border:1px solid var(--line)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:13px 0}
.chip{font-size:13px;color:var(--text);background:var(--panel2);border:1px solid var(--line);padding:6px 11px;border-radius:999px}
.brief{border-top:1px solid var(--line);margin-top:6px;padding-top:12px}
.brief .t{font-size:14px;font-weight:500;color:var(--accent)}
.brief .a{font-size:13px;color:var(--muted);margin:3px 0 8px}
.faq{font-size:13px;margin:3px 0;padding-left:16px;position:relative}
.faq::before{content:"?";position:absolute;left:0;color:var(--accent)}
#refine{display:none;gap:10px;margin-top:8px}#refine input{flex:1}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <div class="brand"><span class="wordmark">GAMACHE</span><span class="pill">Intentions SEO</span></div>
  <div class="tagline">Un site (URL) ou « nom, secteur » + une région → intentions, clusters et briefs de contenu.</div>
  <div class="bar">
    <input id="seed" placeholder="https://site-client.com   ou   P2P Excavation, excavation">
    <input id="region" placeholder="Région" value="Québec">
    <button id="go">Analyser</button>
  </div>
  <div id="status"></div>
  <div id="results"></div>
  <div id="refine">
    <input id="instr" placeholder="Ajuster : « ajoute des intentions transactionnelles », « focus Rive-Sud »…">
    <button id="rgo">Ajuster</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const $=s=>document.querySelector(s);
let current=null;
const COL={informationnel:'#6ea8d8',commercial:'#caa86a',transactionnel:'#5fbf8f',local:'#5bb3a3'};
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML}
function badge(t,c){return `<span class="b" style="color:${c};border-color:${c}40;background:${c}1a">${esc(t)}</span>`}
function render(data){
  current=data;
  const cl=(data&&data.clusters)||[];
  if(!cl.length){$('#results').innerHTML='<div class="tagline">Aucun cluster — reformule le point de départ.</div>';return}
  const cards=cl.map(c=>{
    const col=COL[(c.intention||'').toLowerCase()]||'#8b877e';const b=c.brief||{};
    return `<div class="card">
      <div class="chead"><span class="cname">${esc(c.nom)}</span>
      <span class="badges">${badge(c.intention,col)}${badge('priorité '+(c.priorite||''),'#caa86a')}</span></div>
      <div class="chips">${(c.requetes||[]).map(q=>`<span class="chip">${esc(q)}</span>`).join('')}</div>
      <div class="brief"><div class="t">${esc(b.titre)}</div><div class="a">${esc(b.angle)}</div>
      ${(b.faq||[]).map(f=>`<div class="faq">${esc(f)}</div>`).join('')}</div></div>`}).join('');
  const sr=(data.recherches_google||[]);
  const meta=(data.nb_requetes_reelles?`<div class="tagline" style="margin:0 0 8px;color:var(--accent)">${data.nb_requetes_reelles} recherches Google réelles consultées (ancrage) · 0 inventée</div>`:'')
    +(data.note_donnees?`<div class="tagline" style="margin:0 0 10px">${esc(data.note_donnees)}</div>`:'')
    +(sr.length?`<div class="tagline" style="margin:0 0 6px">Vraies recherches Google consultées</div><div class="chips">${sr.map(s=>`<span class="chip">${esc(s)}</span>`).join('')}</div>`:'');
  const rc=(data.sources_recommandees||[]);
  const sources=rc.length?`<div class="tagline" style="margin:18px 0 6px">Pour aller plus loin — accès à brancher</div><div class="chips">${rc.map(s=>`<span class="chip">+ ${esc(s)}</span>`).join('')}</div>`:'';
  $('#results').innerHTML=meta+cards+sources;
  $('#refine').style.display='flex';
  if(window.gsap)gsap.from('.card',{y:14,opacity:0,duration:.4,stagger:.05,ease:'power2.out'});
}
async function call(url,body,msg){
  $('#go').disabled=true;$('#rgo').disabled=true;$('#status').textContent=msg;
  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.error){$('#status').textContent='⚠️ '+(d.detail||d.error)}
    else{$('#status').textContent=`${(d.clusters||[]).length} clusters · ${esc(d.client||'')}`;render(d)}
  }catch(e){$('#status').textContent='⚠️ '+e.message}
  $('#go').disabled=false;$('#rgo').disabled=false;
}
$('#go').onclick=()=>{const seed=$('#seed').value.trim();if(!seed)return;
  call('/analyze',{seed,region:$('#region').value.trim()||'Québec'},'Analyse en cours… (Gemini Pro, ~15-30 s)')};
$('#rgo').onclick=()=>{const instruction=$('#instr').value.trim();if(!instruction||!current)return;
  call('/refine',{result:current,instruction,region:$('#region').value.trim()||'Québec'},'Ajustement…');$('#instr').value=''};
$('#seed').addEventListener('keydown',e=>{if(e.key==='Enter')$('#go').click()});
$('#instr').addEventListener('keydown',e=>{if(e.key==='Enter')$('#rgo').click()});
</script>
</body>
</html>
